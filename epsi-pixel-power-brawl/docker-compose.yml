version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: pixel_postgres
    environment:
      POSTGRES_DB: pixelpowerbrawl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: pixel_api
    depends_on:
      - postgres
    ports:
      - "8081:8081"
